<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Favorite Person ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        /* 2026 Modern Aesthetic - Glassmorphism & Advanced Animations */
        * {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(-45deg, #ffe5ec, #ffc2d1, #ffb3c6, #ff99ad);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated gradient background */
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating Hearts Background */
        .heart-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .floating-heart {
            position: absolute;
            color: #ff85a1;
            opacity: 0.6;
            animation: floatUp 6s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite;
            filter: blur(0.5px);
            font-size: 3.5rem;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(105vh) rotate(0deg) scale(0.5);
                opacity: 0.8;
            }
            50% {
                opacity: 0.7;
            }
            100% {
                transform: translateY(-10vh) rotate(360deg) scale(1.5);
                opacity: 0;
            }
        }

        /* Card Container - Liquid Glassmorphism Effect */
        .card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 8px 32px rgba(255, 71, 126, 0.15),
                        0 0 0 1px rgba(255, 255, 255, 0.7) inset,
                        inset 0 1px 0 rgba(255, 255, 255, 0.9),
                        0 20px 60px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 520px;
            width: 90%;
            z-index: 10;
            border: 2px solid rgba(255, 179, 198, 0.4);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: cardEntrance 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), liquidGlow 4s ease-in-out infinite;
            transform: perspective(1000px) rotateX(0deg);
        }

        @keyframes liquidGlow {
            0%, 100% {
                background: rgba(255, 255, 255, 0.6);
                box-shadow: 0 8px 32px rgba(255, 71, 126, 0.15),
                            0 0 0 1px rgba(255, 255, 255, 0.7) inset,
                            inset 0 1px 0 rgba(255, 255, 255, 0.9),
                            0 20px 60px rgba(0, 0, 0, 0.1);
            }
            50% {
                background: rgba(255, 255, 255, 0.75);
                box-shadow: 0 12px 48px rgba(255, 71, 126, 0.25),
                            0 0 0 1px rgba(255, 255, 255, 0.8) inset,
                            inset 0 1px 0 rgba(255, 255, 255, 1),
                            0 20px 80px rgba(255, 71, 126, 0.1);
            }
        }

        @keyframes cardEntrance {
            0% {
                opacity: 0;
                transform: perspective(1000px) rotateX(15deg) translateY(30px);
            }
            100% {
                opacity: 1;
                transform: perspective(1000px) rotateX(0deg) translateY(0);
            }
        }

        .card:hover {
            box-shadow: 0 12px 48px rgba(255, 71, 126, 0.25),
                        0 0 0 1px rgba(255, 255, 255, 0.8) inset;
            transform: perspective(1000px) translateY(-5px);
        }

        h2 {
            color: #ff477e;
            margin-bottom: 25px;
            font-size: 1.5rem;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: textFadeIn 0.8s ease-out;
            background: linear-gradient(135deg, #ff477e, #ff0a54);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h2.quote-text {
            font-size: 1.3rem;
            font-weight: 500;
            line-height: 1.8;
            min-height: auto;
            background: linear-gradient(135deg, #ff477e, #ff85a1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-style: italic;
            letter-spacing: 0.5px;
        }

        @keyframes textFadeIn {
            0% {
                opacity: 0;
                transform: translateY(15px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .couple-img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 22px;
            margin-bottom: 30px;
            border: 3px solid rgba(255, 179, 198, 0.4);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1),
                        0 0 0 1px rgba(255, 255, 255, 0.8) inset;
            animation: imgSlideIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            transition: all 0.5s ease;
        }

        @keyframes imgSlideIn {
            0% {
                opacity: 0;
                transform: scale(0.95) rotateY(10deg);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotateY(0);
            }
        }

        .couple-img:hover {
            transform: scale(1.03) rotateY(-2deg);
            filter: brightness(1.1);
        }

        /* Buttons Styling - Modern Interactive Design */
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            position: relative;
            height: 60px;
            animation: btnContainerFadeIn 1s ease-out 0.3s backwards;
        }

        @keyframes btnContainerFadeIn {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn {
            padding: 18px 42px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            animation: btnPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes btnPop {
            0% {
                opacity: 0;
                transform: scale(0.7);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Ripple Effect */
        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:active::before {
            width: 300px;
            height: 300px;
        }

        .btn-yes {
            background: linear-gradient(135deg, #ff477e, #ff0a54);
            color: white;
            box-shadow: 0 8px 20px rgba(255, 71, 126, 0.4);
            z-index: 5;
        }

        .btn-yes:hover {
            transform: translateY(-3px) scale(1.08);
            box-shadow: 0 12px 35px rgba(255, 71, 126, 0.6),
                        0 0 20px rgba(255, 71, 126, 0.3);
            filter: brightness(1.1);
        }

        .btn-yes:active {
            transform: translateY(-1px) scale(1.05);
        }

        .btn-no, .btn-hate {
            background: linear-gradient(135deg, #adb5bd, #8d9399);
            color: white;
            position: absolute;
            transition: all 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 20;
            white-space: nowrap;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .btn-no:hover, .btn-hate:hover {
            background: linear-gradient(135deg, #8d9399, #6c757d);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
            transform: scale(1.08);
        }

        /* Success screen styling */
        .victory-text {
            animation: victoryPop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            color: #ff477e;
            font-weight: bold;
            font-size: 1.1rem;
            display: block;
            background: linear-gradient(135deg, #ff477e, #ff85a1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        @keyframes victoryPop {
            0% {
                opacity: 0;
                transform: scale(0.5) rotate(-10deg);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotate(0);
            }
        }

        /* Confetti particle animation */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            pointer-events: none;
            animation: confettiFall 3s ease-out forwards;
        }

        @keyframes confettiFall {
            0% {
                opacity: 1;
                transform: translateY(0) translateX(0) rotate(0deg) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(800px) translateX(var(--tx)) rotate(720deg) scale(0);
            }
        }

        /* Enhanced cursor effect */
        .mouse-trail {
            position: fixed;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            pointer-events: none;
            animation: trailFade 0.8s ease-out forwards;
            background: linear-gradient(135deg, #ff477e, #ff85a1);
        }

        @keyframes trailFade {
            0% {
                opacity: 0.8;
                transform: scale(1);
            }
            100% {
                opacity: 0;
                transform: scale(0);
            }
        }

        /* ===== SPLASH SCREEN STYLES ===== */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(-45deg, #ffe5ec, #ffc2d1, #ffb3c6, #ff99ad);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            pointer-events: all;
            overflow: hidden;
        }

        .splash-screen::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255, 107, 167, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 179, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(255, 195, 209, 0.2) 0%, transparent 50%);
            animation: floatBg 8s ease-in-out infinite;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes floatBg {
            0%, 100% {
                transform: translate(0, 0);
            }
            33% {
                transform: translate(30px, -30px);
            }
            66% {
                transform: translate(-30px, 30px);
            }
        }

        .splash-particle {
            position: absolute;
            pointer-events: none;
            z-index: 0;
        }

        .splash-particle::before {
            content: '💖';
            display: block;
            opacity: 0.4;
            font-size: 2rem;
            animation: particleFloat 6s ease-in-out infinite;
        }

        @keyframes particleFloat {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            50% {
                transform: translate(30px, -50px) scale(0.8);
            }
        }

        .splash-screen.hidden {
            animation: fadeOutScreen 0.8s ease-out forwards;
            pointer-events: none;
        }

        @keyframes fadeOutScreen {
            0% {
                opacity: 1;
                transform: scale(1);
            }
            100% {
                opacity: 0;
                transform: scale(1.1);
            }
        }

        .splash-content {
            text-align: center;
            animation: splashPulse 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            z-index: 1;
        }

        @keyframes splashPulse {
            0% {
                opacity: 0;
                transform: scale(0.8);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .splash-heart {
            font-size: 5rem;
            margin-bottom: 20px;
            animation: heartBeat 1.5s ease-in-out infinite;
        }

        @keyframes heartBeat {
            0%, 100% {
                transform: scale(1);
            }
            25% {
                transform: scale(1.1);
            }
            50% {
                transform: scale(1);
            }
        }

        .splash-title {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ff477e, #ff0a54);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
        }

        .splash-subtitle {
            font-size: 1.1rem;
            color: #ff477e;
            font-weight: 300;
            margin-bottom: 40px;
        }

        .splash-btn {
            padding: 16px 50px;
            font-size: 1.1rem;
            font-weight: 600;
            background: linear-gradient(135deg, #ff477e, #ff0a54);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(255, 71, 126, 0.4);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .splash-btn:hover {
            transform: translateY(-3px) scale(1.08);
            box-shadow: 0 12px 35px rgba(255, 71, 126, 0.6);
        }

        /* ===== SLIDESHOW STYLES ===== */
        .slideshow-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(-45deg, #ffe5ec, #ffc2d1, #ffb3c6, #ff99ad);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            opacity: 1;
            transition: opacity 0.8s ease;
            overflow: hidden;
        }

        .slideshow-screen::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255, 107, 167, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 179, 198, 0.2) 0%, transparent 50%);
            animation: floatBg 10s ease-in-out infinite;
            z-index: 0;
            pointer-events: none;
        }

        .slideshow-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .slideshow-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            padding: 60px 50px;
            border-radius: 30px;
            box-shadow: 0 8px 32px rgba(255, 71, 126, 0.15),
                        0 0 0 1px rgba(255, 255, 255, 0.7) inset,
                        inset 0 1px 0 rgba(255, 255, 255, 0.9),
                        0 20px 60px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 650px;
            width: 90%;
            animation: slideIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            z-index: 1;
        }

        @keyframes slideIn {
            0% {
                opacity: 0;
                transform: translateX(-50px) rotateY(15deg);
            }
            100% {
                opacity: 1;
                transform: translateX(0) rotateY(0);
            }
        }

        .quote-display {
            font-size: 1.6rem;
            font-weight: 500;
            color: #ff477e;
            margin-bottom: 40px;
            line-height: 2;
            min-height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: quoteAnimate 0.8s ease-out;
            word-spacing: 0.15em;
            letter-spacing: 0.02em;
        }

        @keyframes quoteAnimate {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .quote-exit {
            animation: quoteExit 0.6s ease-in forwards;
        }

        @keyframes quoteExit {
            0% {
                opacity: 1;
                transform: translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-20px);
            }
        }

        @keyframes heartFloat {
            0%, 100% {
                transform: scale(1) translateY(0);
                opacity: 0.6;
            }
            50% {
                transform: scale(1.1) translateY(-10px);
                opacity: 1;
            }
        }

        .slide-counter {
            font-size: 0.95rem;
            color: #ff85a1;
            margin-bottom: 20px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .slide-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
        }

        .slide-btn {
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 600;
            background: linear-gradient(135deg, #ff477e, #ff0a54);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 71, 126, 0.3);
        }

        .slide-btn:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 8px 25px rgba(255, 71, 126, 0.5);
        }

        /* ===== PUZZLE STYLES ===== */
        .puzzle-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(-45deg, #ffe5ec, #ffc2d1, #ffb3c6, #ff99ad);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 998;
            opacity: 1;
            transition: opacity 0.8s ease;
            padding: 20px;
        }

        .puzzle-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .puzzle-container {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 8px 32px rgba(255, 71, 126, 0.15),
                        0 0 0 1px rgba(255, 255, 255, 0.7) inset;
            text-align: center;
            max-width: 700px;
            width: 90%;
            animation: slideIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .puzzle-title {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ff477e, #ff0a54);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .puzzle-instruction {
            font-size: 1.1rem;
            color: #ff85a1;
            margin-bottom: 30px;
            font-weight: 300;
        }

        .puzzle-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
            gap: 12px;
            margin-bottom: 30px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .puzzle-tile {
            background: linear-gradient(135deg, rgba(255, 71, 126, 0.2), rgba(255, 168, 195, 0.2));
            border: 2px solid rgba(255, 71, 126, 0.3);
            padding: 15px;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: move;
            user-select: none;
            transition: all 0.3s ease;
            color: #ff477e;
        }

        .puzzle-tile:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, rgba(255, 71, 126, 0.4), rgba(255, 168, 195, 0.4));
            box-shadow: 0 4px 15px rgba(255, 71, 126, 0.3);
        }

        .puzzle-tile.placed {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .puzzle-slots {
            display: flex;
            gap: 8px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .puzzle-slot {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.3);
            border: 2px dashed rgba(255, 71, 126, 0.4);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 600;
            color: #ff477e;
            transition: all 0.3s ease;
        }

        .puzzle-slot.filled {
            background: rgba(255, 71, 126, 0.15);
            border: 2px solid rgba(255, 71, 126, 0.5);
        }

        .puzzle-result {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ff477e, #ff0a54);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-top: 20px;
            animation: resultPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes resultPop {
            0% {
                opacity: 0;
                transform: scale(0);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .puzzle-next-btn {
            padding: 14px 40px;
            font-size: 1rem;
            font-weight: 600;
            background: linear-gradient(135deg, #ff477e, #ff0a54);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 71, 126, 0.3);
            margin-top: 20px;
        }

        .puzzle-next-btn:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 8px 25px rgba(255, 71, 126, 0.5);
        }

        .puzzle-next-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <!-- Interactive Background -->
    <div class="heart-bg" id="heartBg"></div>

    <!-- SPLASH SCREEN -->
    <div class="splash-screen" id="splashScreen">
        <div class="splash-particle" style="top: 15%; left: 10%; animation-delay: 0s;"></div>
        <div class="splash-particle" style="top: 25%; right: 15%; animation-delay: 1s;"></div>
        <div class="splash-particle" style="top: 70%; left: 20%; animation-delay: 2s;"></div>
        <div class="splash-particle" style="top: 60%; right: 10%; animation-delay: 1.5s;"></div>
        <div class="splash-particle" style="bottom: 15%; left: 40%; animation-delay: 0.5s;"></div>
        <div class="heart-bg"></div>
        <div class="splash-content">
            <div class="splash-heart">💖</div>
            <div class="splash-title">For My Favorite Person</div>
            <div class="splash-subtitle">I have something to say to you...</div>
            <button class="splash-btn" onclick="startSlideshow()">Continue ❤️</button>
        </div>
    </div>

    <!-- SLIDESHOW SCREEN -->
    <div class="slideshow-screen" id="slideshowScreen">
        <div class="slideshow-card">
            <div class="slide-counter"><span id="slideNum">1</span> / <span id="slideTotal">10</span></div>
            <div id="slideHearts" style="text-align: center; margin-bottom: 20px; font-size: 2rem; letter-spacing: 10px; animation: heartFloat 1.5s ease-in-out infinite;">💖 💕 💖</div>
            <div class="quote-display" id="quoteDisplay"></div>
        </div>
    </div>

    <!-- PUZZLE SCREEN -->
    <div class="puzzle-screen" id="puzzleScreen">
        <div class="puzzle-container">
            <div class="puzzle-title">One More Thing... 🧩</div>
            <div class="puzzle-instruction">Click tiles to spell out your message!</div>
            <div class="puzzle-grid" id="puzzleGrid"></div>
            <div class="puzzle-slots" id="puzzleSlots"></div>
            <button class="puzzle-next-btn" id="puzzleBtn" onclick="checkPuzzle()" disabled>Submit</button>
            <div class="puzzle-result" id="puzzleResult"></div>
        </div>
    </div>

    <!-- Main Content Card -->
    <div class="card" id="quizCard">
        <img id="displayImg" class="couple-img" src="" alt="Our Moments">
        <h2 id="questionText">Loading our memories...</h2>
        
        <div class="btn-container" id="btnContainer">
            <!-- Dynamic buttons handled by JS -->
        </div>
    </div>

    <script>
        // ====== APOLOGY QUOTES FOR SLIDESHOW ======
        const apologyQuotes = [
            "I know saying sorry is not enough after an argument like that...",
            "But I want you to know I understand what I did wrong.",
            "You mean the world to me, and hurting you hurts me too.",
            "I promise to do better, to listen more, and to be there for you.",
            "Our relationship is worth fighting for, and I'm going to fight.",
            "Thank you for giving me another chance to show you how much you matter.",
            "I love you more than I can express in words.",
            "Every moment with you is precious to me.",
            "Let's grow together and make beautiful memories ahead.",
            "I'm ready to prove my love through my actions. 💖"
        ];

        // ====== PUZZLE GAME DATA ======
        const puzzleMessage = "I LOVE YOU SO MUCH";
        const puzzleLetters = ["I", "L", "O", "V", "E", "Y", "O", "U", "S", "O", "M", "U", "C", "H", "O", "U"];
        const correctOrder = ["I", "L", "O", "V", "E", "Y", "O", "U", "S", "O", "M", "U", "C", "H"];

        let currentSlide = 0;
        let puzzleSlots = [];
        let puzzleState = {};

        // ====== SPLASH SCREEN FUNCTIONS ======
        function startSlideshow() {
            const splash = document.getElementById('splashScreen');
            splash.classList.add('hidden');
            setTimeout(() => {
                splash.style.display = 'none';
                showSlide(0);
                scheduleNextQuote();
            }, 800);
        }

        // ====== SLIDESHOW FUNCTIONS - AUTO PLAY ======
        let slideTimer = null;
        const QUOTE_DURATION = 4000; // 4 seconds per quote

        function showSlide(index) {
            if (index < 0 || index >= apologyQuotes.length) return;
            
            currentSlide = index;
            const quoteDisplay = document.getElementById('quoteDisplay');
            
            // Exit animation for old quote
            if (quoteDisplay.textContent) {
                quoteDisplay.classList.add('quote-exit');
            }
            
            setTimeout(() => {
                quoteDisplay.classList.remove('quote-exit');
                quoteDisplay.textContent = apologyQuotes[index];
                quoteDisplay.style.animation = 'none';
                quoteDisplay.offsetHeight; // Trigger reflow
                quoteDisplay.style.animation = 'quoteAnimate 0.8s ease-out';
                
                document.getElementById('slideNum').textContent = index + 1;
                document.getElementById('slideTotal').textContent = apologyQuotes.length;
                
                createSlideHeartEffect();
            }, 300);
        }

        function createSlideHeartEffect() {
            const heartsContainer = document.getElementById('slideHearts');
            if (heartsContainer) {
                heartsContainer.style.animation = 'none';
                heartsContainer.offsetHeight; // Trigger reflow
                heartsContainer.style.animation = 'heartFloat 1.5s ease-in-out infinite';
            }
        }

        function skipToNext() {
            currentSlide++;
            
            if (currentSlide >= apologyQuotes.length) {
                // Start puzzle
                clearTimeout(slideTimer);
                startPuzzle();
            } else {
                clearTimeout(slideTimer);
                showSlide(currentSlide);
                scheduleNextQuote();
            }
        }

        function scheduleNextQuote() {
            slideTimer = setTimeout(() => {
                currentSlide++;
                
                if (currentSlide >= apologyQuotes.length) {
                    // Auto transition to puzzle after last quote
                    startPuzzle();
                } else {
                    showSlide(currentSlide);
                    scheduleNextQuote();
                }
            }, QUOTE_DURATION);
        }

        function prevSlide() {
            if (currentSlide > 0) {
                showSlide(currentSlide - 1);
            }
        }

        function nextSlide() {
            if (currentSlide < apologyQuotes.length - 1) {
                showSlide(currentSlide + 1);
            }
        }

        // ====== PUZZLE FUNCTIONS ======
        function startPuzzle() {
            const slideshow = document.getElementById('slideshowScreen');
            slideshow.classList.add('hidden');
            setTimeout(() => {
                slideshow.style.display = 'none';
                initPuzzle();
            }, 800);
        }

        function initPuzzle() {
            const puzzleGrid = document.getElementById('puzzleGrid');
            const puzzleSlotsDom = document.getElementById('puzzleSlots');
            
            // Create slots (empty spaces for solution)
            puzzleSlots = new Array(correctOrder.length);
            for (let i = 0; i < correctOrder.length; i++) {
                const slot = document.createElement('div');
                slot.className = 'puzzle-slot';
                slot.id = `slot-${i}`;
                slot.textContent = '';
                slot.ondrop = (e) => dropTile(e, i);
                slot.ondragover = (e) => e.preventDefault();
                puzzleSlotsDom.appendChild(slot);
                puzzleState[i] = null;
            }

            // Shuffle letters and create draggable tiles
            const shuffled = [...puzzleLetters].sort(() => Math.random() - 0.5);
            for (let i = 0; i < shuffled.length; i++) {
                const tile = document.createElement('div');
                tile.className = 'puzzle-tile';
                tile.id = `tile-${i}`;
                tile.textContent = shuffled[i];
                tile.draggable = true;
                tile.ondragstart = (e) => dragStart(e, i, shuffled[i]);
                puzzleGrid.appendChild(tile);
            }

            document.getElementById('puzzleScreen').style.opacity = '1';
        }

        function dragStart(e, index, letter) {
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('letter', letter);
            e.dataTransfer.setData('tileIndex', index);
        }

        function dropTile(e, slotIndex) {
            e.preventDefault();
            const letter = e.dataTransfer.getData('letter');
            const tileIndex = e.dataTransfer.getData('tileIndex');
            
            // Check if already filled
            if (puzzleState[slotIndex] !== null) {
                // Replace existing
                const oldLetter = puzzleState[slotIndex];
                const oldTile = document.getElementById(`tile-${tileIndex}`);
                if (oldTile) oldTile.classList.remove('placed');
            }

            puzzleState[slotIndex] = letter;
            const slot = document.getElementById(`slot-${slotIndex}`);
            slot.textContent = letter;
            slot.classList.add('filled');

            const tile = document.getElementById(`tile-${tileIndex}`);
            tile.classList.add('placed');

            checkPuzzleReady();
        }

        function checkPuzzleReady() {
            const allFilled = Object.values(puzzleState).every(val => val !== null);
            document.getElementById('puzzleBtn').disabled = !allFilled;
        }

        function checkPuzzle() {
            const userAnswer = Object.values(puzzleState).join('');
            const correctAnswer = correctOrder.join('');

            if (userAnswer === correctAnswer) {
                document.getElementById('puzzleResult').textContent = '✨ You solved it! I love you so much! ✨';
                document.getElementById('puzzleBtn').textContent = 'Continue to the Grand Finale →';
                document.getElementById('puzzleBtn').disabled = false;
                document.getElementById('puzzleBtn').onclick = startMainFlow;
                createConfetti();
            } else {
                alert('Not quite right yet! Try again! 💕');
            }
        }

        function startMainFlow() {
            const puzzle = document.getElementById('puzzleScreen');
            puzzle.classList.add('hidden');
            setTimeout(() => {
                puzzle.style.display = 'none';
                document.getElementById('quizCard').style.display = 'flex';
                document.getElementById('quizCard').style.flexDirection = 'column';
                document.getElementById('quizCard').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('quizCard').style.opacity = '1';
                    renderStep();
                }, 100);
            }, 800);
        }

        // ====== CONFETTI FUNCTION ======
        function createConfetti() {
            const colors = ['#ff477e', '#ff85a1', '#ffb3c6', '#ffc2d1', '#ffe5ec'];
            
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * window.innerWidth + 'px';
                confetti.style.top = '-10px';
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.setProperty('--tx', (Math.random() - 0.5) * 300 + 'px');
                confetti.style.animation = `confettiFall ${2 + Math.random() * 1.5}s ease-out forwards`;
                
                document.body.appendChild(confetti);
                
                setTimeout(() => confetti.remove(), 3500);
            }
        }

        // ====== ORIGINAL QUIZ LOGIC ======
        // Steps/Questions Configuration mapping your exact photos
        const steps = [
            {
                text: "I'll try to be the best for you. I'm sorry for the things that happened between us. You mean everything to me. 💖",
                img: "WhatsApp Image 2026-06-09 at 1.43.37 PM.jpeg",
                type: "normal",
                isQuote: true
            },
            {
                text: "I know I've been super annoying lately, and being far away makes it harder... Can you forgive me? 🥺",
                img: "WhatsApp Image 2026-06-09 at 1.43.37 PM.jpeg",
                type: "normal"
            },
            {
                text: "Look at us! Aren't we genuinely the cutest dynamic duo out there? ✨",
                img: "WhatsApp Image 2026-06-09 at 1.43.38 PM.jpeg",
                type: "normal"
            },
            {
                text: "Even when you make silly faces at me on the bus, you know I'm completely crazy about you, right? 🚌💨",
                img: "WhatsApp Image 2026-06-09 at 1.43.38 PM (1).jpeg",
                type: "normal"
            },
            {
                text: "Are you still mad at me? 👉👈",
                img: "WhatsApp Image 2026-06-09 at 1.43.38 PM (2).jpeg",
                type: "runaway-no"
            },
            {
                text: "Last question... please say you love me! 🥰",
                img: "WhatsApp Image 2026-06-09 at 1.38.00 PM.jpeg",
                type: "runaway-hate"
            }
        ];

        let currentStep = 0;
        let mouseTrailEnabled = true;

        const questionText = document.getElementById('questionText');
        const displayImg = document.getElementById('displayImg');
        const btnContainer = document.getElementById('btnContainer');

        // Hide quiz card initially
        document.getElementById('quizCard').style.display = 'none';

        // ====== MODERN INTERACTIVE EFFECTS ======

        // Mouse Trail Effect (Cursor Glow)
        document.addEventListener('mousemove', (e) => {
            if (!mouseTrailEnabled) return;
            
            const trail = document.createElement('div');
            trail.className = 'mouse-trail';
            trail.style.left = e.clientX + 'px';
            trail.style.top = e.clientY + 'px';
            document.body.appendChild(trail);
            
            setTimeout(() => trail.remove(), 800);
        });

        // Confetti Explosion
        function createConfetti() {
            const colors = ['#ff477e', '#ff85a1', '#ffb3c6', '#ffc2d1', '#ffe5ec'];
            
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * window.innerWidth + 'px';
                confetti.style.top = '-10px';
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.setProperty('--tx', (Math.random() - 0.5) * 300 + 'px');
                confetti.style.animation = `confettiFall ${2 + Math.random() * 1.5}s ease-out forwards`;
                
                document.body.appendChild(confetti);
                
                setTimeout(() => confetti.remove(), 3500);
            }
        }

        // Smooth Page Transition
        function transitionStep() {
            const card = document.getElementById('quizCard');
            card.style.animation = 'none';
            card.offsetHeight; // Trigger reflow
            card.style.animation = 'cardEntrance 0.8s cubic-bezier(0.34, 1.56, 0.64, 1)';
            
            questionText.style.animation = 'none';
            questionText.offsetHeight;
            questionText.style.animation = 'textFadeIn 0.8s ease-out';
            
            displayImg.style.animation = 'none';
            displayImg.offsetHeight;
            displayImg.style.animation = 'imgSlideIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1)';
        }

        function renderStep() {
            const step = steps[currentStep];
            
            // Smooth fade transition
            questionText.style.opacity = '0';
            displayImg.style.opacity = '0';
            
            setTimeout(() => {
                questionText.innerText = step.text;
                displayImg.src = step.img;
                btnContainer.innerHTML = ''; // Clear container
                
                // Add quote styling if it's a quote step
                if (step.isQuote) {
                    questionText.classList.add('quote-text');
                } else {
                    questionText.classList.remove('quote-text');
                }
                
                // Fade in
                questionText.style.transition = 'opacity 0.3s ease';
                displayImg.style.transition = 'opacity 0.3s ease';
                questionText.style.opacity = '1';
                displayImg.style.opacity = '1';

                if (step.type === "normal") {
                    const yesBtn = document.createElement('button');
                    yesBtn.className = 'btn btn-yes';
                    yesBtn.innerText = "Yes, I forgive you! ❤️";
                    yesBtn.onclick = nextStep;
                    btnContainer.appendChild(yesBtn);

                } else if (step.type === "runaway-no") {
                    const yesBtn = document.createElement('button');
                    yesBtn.className = 'btn btn-yes';
                    yesBtn.innerText = "Not anymore! 🥰";
                    yesBtn.onclick = nextStep;

                    const noBtn = document.createElement('button');
                    noBtn.className = 'btn btn-no';
                    noBtn.innerText = "Yes, still mad 😡";
                    noBtn.style.left = "55%";
                    
                    makeButtonRun(noBtn);

                    btnContainer.appendChild(yesBtn);
                    btnContainer.appendChild(noBtn);

                } else if (step.type === "runaway-hate") {
                    const loveBtn = document.createElement('button');
                    loveBtn.className = 'btn btn-yes';
                    loveBtn.innerText = "I love you! 💖";
                    loveBtn.onclick = showVictoryScreen;

                    const hateBtn = document.createElement('button');
                    hateBtn.className = 'btn btn-hate';
                    hateBtn.innerText = "I hate you 👿";
                    hateBtn.style.left = "55%";

                    makeButtonRun(hateBtn);

                    btnContainer.appendChild(loveBtn);
                    btnContainer.appendChild(hateBtn);
                }
            }, 200);

            transitionStep();
        }

        function nextStep() {
            currentStep++;
            if (currentStep < steps.length) {
                renderStep();
            }
        }

        function showVictoryScreen() {
            mouseTrailEnabled = false;
            
            // Victory animation
            createConfetti();
            
            displayImg.src = "WhatsApp Image 2026-06-09 at 1.37.32 PM.jpeg";
            questionText.innerText = "Yay!! I love you infinitely more! Thank you for being the sweetest, most patient girlfriend. I promise to worry you less! 💖✈️";
            
            const victoryMsg = document.createElement('div');
            victoryMsg.className = 'victory-text';
            victoryMsg.innerHTML = '✨ Successfully Un-Annoyed! ✨';
            btnContainer.innerHTML = '';
            btnContainer.appendChild(victoryMsg);
            
            // Celebrate effect
            document.getElementById('quizCard').style.animation = 'none';
            setTimeout(() => {
                document.getElementById('quizCard').style.transform = 'scale(1.05)';
            }, 100);
        }

        // Runaway Button Logic with Enhanced Animation
        function makeButtonRun(button) {
            let listenerAttached = false;

            const avoidMouse = (e) => {
                const btnRect = button.getBoundingClientRect();
                const mouseX = e.clientX;
                const mouseY = e.clientY;
                const btnX = btnRect.left + btnRect.width / 2;
                const btnY = btnRect.top + btnRect.height / 2;

                const distance = Math.hypot(mouseX - btnX, mouseY - btnY);

                // Teleport button if mouse gets within 85px
                if (distance < 85) {
                    const cardRect = document.getElementById('quizCard').getBoundingClientRect();
                    
                    const randomX = Math.random() * (cardRect.width - btnRect.width - 40) + 20;
                    const randomY = Math.random() * (cardRect.height - btnRect.height - 120) + 40;

                    button.style.position = 'fixed';
                    button.style.left = `${cardRect.left + randomX}px`;
                    button.style.top = `${cardRect.top + randomY}px`;
                    
                    // Add wiggle animation
                    button.style.animation = 'btnPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)';
                }
            };

            if (!listenerAttached) {
                window.addEventListener('mousemove', avoidMouse);
                listenerAttached = true;
            }
            
            // Mobile safe trick
            button.addEventListener('touchstart', () => {
                const cardRect = document.getElementById('quizCard').getBoundingClientRect();
                const randomX = Math.random() * (cardRect.width - 120);
                button.style.position = 'fixed';
                button.style.left = `${cardRect.left + randomX}px`;
            });
        }

        // Spawning background particle hearts with variation
        function createHeart() {
            const heartBg = document.getElementById('heartBg');
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            
            const hearts = ['❤️', '💕', '💖', '💝'];
            heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            
            const duration = Math.random() * 3 + 4;
            heart.style.animationDuration = duration + 's';
            
            const size = Math.random() * 50 + 35 + 'px';
            heart.style.fontSize = size;

            heartBg.appendChild(heart);

            setTimeout(() => { heart.remove(); }, duration * 1000);
        }

        setInterval(createHeart, 300);

        // Run app
        renderStep();
    </script>
</body>
</html>
